<head>

<title>2026.07.08 经营日报 v72</title>
<style>
  :root{
    color-scheme: light dark;
    --bg:#f3f1ec; --card:#ffffff; --card2:#faf8f4; --ink:#23262b; --muted:#5d6470; --dim:#878d97;
    --line:#e4e0d7; --gold:#9a7b2e;
    --red:#c0392b; --red-bg:#fbe9e6; --amber:#9a6f0a; --amber-bg:#fbf2d6;
    --green:#1e7d52; --green-bg:#e2f3e9; --blue:#2a6fb0; --blue-bg:#e7f0fa;
  }
  html{color-scheme:light dark;background:var(--bg)}
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1a1c1f; --card:#26292e; --card2:#2d3137; --ink:#e9e7e2; --muted:#aab0ba; --dim:#7f858f;
      --line:#3a3e45; --gold:#d8bd6e;
      --red:#ff6f62; --red-bg:#3a2421; --amber:#e6b733; --amber-bg:#36301a;
      --green:#54cf90; --green-bg:#1d3329; --blue:#62abec; --blue-bg:#1d2c3a;
    }
    header{background:linear-gradient(160deg,#26292e,#1f2226)}
    .toc{background:rgba(26,28,31,.95)}
    .warn{background:#36301a;border-color:#6b5a1e;color:#e6b733}
    header h1, summary, .kpi .v, .card2 .h, .dec .dh{color:var(--ink)}
    .toc a{background:var(--card)}
    td.red, .em, .kpi .v.red{color:var(--red)}
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
    font-size:15px;line-height:1.62;padding-bottom:50px;-webkit-text-size-adjust:100%}
  header{background:linear-gradient(160deg,#ffffff,#efece5);padding:18px 16px 15px;border-bottom:2px solid var(--gold)}
  header .day{font-size:11px;letter-spacing:.25em;color:var(--gold);font-weight:700}
  header h1{font-size:19px;margin:4px 0 2px;color:var(--ink)}
  header .sub{font-size:12px;color:var(--muted)}
  .warn{background:#fbf2d6;border:1px solid #d9b84a;color:#9a6f0a;font-size:12.5px;
    padding:9px 12px;margin:12px 12px 0;border-radius:9px;line-height:1.55}
  .wrap{padding:12px 12px 0}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 8px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .kpi .l{font-size:10.5px;color:var(--dim)}
  .kpi .v{font-size:16px;font-weight:700;margin-top:2px;color:var(--ink)}
  .kpi .v.red{color:var(--red)} .kpi .v.amber{color:var(--amber)} .kpi .v.green{color:var(--green)}
  .kpi .d{font-size:10px;color:var(--muted);margin-top:1px}
  .glance{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .glance .row{display:flex;gap:7px;padding:4px 0;font-size:13px;border-bottom:1px dashed var(--line)}
  .glance .row:last-child{border-bottom:none}
  .tag{flex-shrink:0}
