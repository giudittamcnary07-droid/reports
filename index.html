<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>推送测试</title>
<style>
  :root{
    --bg:#f6f4ef; --card:#fff; --ink:#1c1a17; --sub:#7a7468;
    --line:#e9e4da; --accent:#b8451f; --good:#2f7d4f; --chip:#f0ece3;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#15130f; --card:#201d18; --ink:#f1ece3; --sub:#a39b8c;
      --line:#332e26; --accent:#e0723f; --good:#5bbd84; --chip:#2a261f; }
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:"Noto Sans SC",-apple-system,system-ui,sans-serif;
    background:var(--bg);color:var(--ink);
    padding:18px 16px 40px;line-height:1.6;max-width:480px;margin:0 auto}
  h1{font-family:"Fraunces",Georgia,serif;font-size:26px;font-weight:600;
    letter-spacing:.3px;margin-bottom:4px}
  .date{color:var(--sub);font-size:13px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .tag{display:inline-block;background:var(--chip);color:var(--sub);
    font-size:12px;padding:3px 10px;border-radius:20px;margin-bottom:10px}
  .big{font-size:34px;font-weight:700;font-family:"Fraunces",Georgia,serif;
    color:var(--accent);line-height:1.1}
  .row{display:flex;gap:10px;margin-top:12px}
  .stat{flex:1;background:var(--chip);border-radius:12px;padding:12px 10px;text-align:center}
  .stat .n{font-size:20px;font-weight:700}
  .stat .l{font-size:11px;color:var(--sub);margin-top:2px}
  .ok{color:var(--good);font-weight:600}
  button{width:100%;margin-top:6px;padding:13px;border:none;border-radius:12px;
    background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
  .note{font-size:12px;color:var(--sub);margin-top:14px;text-align:center}
  .live{font-size:13px;color:var(--sub);margin-top:8px}
</style>
</head>
<body>
  <h1>推送测试 ✦</h1>
  <div class="date" id="now">加载中…</div>

  <div class="card">
    <span class="tag">连通性自检</span>
    <div class="big ok">收到了</div>
    <div class="live">如果你在手机端能看到这张卡片、下面数字、还能点按钮,说明 HTML 在窗口内直接打开这条路是通的。</div>
  </div>

  <div class="card">
    <span class="tag">交互测试 · 模拟日报快照</span>
    <div class="row">
      <div class="stat"><div class="n">28</div><div class="l">今日报单</div></div>
      <div class="stat"><div class="n">9</div><div class="l">成交</div></div>
      <div class="stat"><div class="n">32%</div><div class="l">通过率</div></div>
    </div>
    <div class="row">
      <div class="stat"><div class="n" id="tap">0</div><div class="l">点击次数</div></div>
      <div class="stat"><div class="n">3</div><div class="l">在跑部门</div></div>
      <div class="stat"><div class="n">浅/深</div><div class="l">随系统</div></div>
    </div>
    <p style="margin-top:14px"></p>
    <button id="btn">点我测试交互(JS 是否正常)</button>
  </div>

  <div class="note">这只是测试页,不含真实数据。<br>深色模式跟随系统;在手机上换深色看看配色对不对。</div>

<script>
  function pad(n){return n<10?'0'+n:n}
  var d=new Date();
  document.getElementById('now').textContent =
    d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+
    pad(d.getHours())+':'+pad(d.getMinutes())+' · 本机时间';
  var c=0;
  document.getElementById('btn').addEventListener('click',function(){
    c++; document.getElementById('tap').textContent=c;
    this.textContent = c===1 ? '✓ 交互正常,再点几下' : '✓ 已点 '+c+' 次';
  });
</script>
</body>
</html>
