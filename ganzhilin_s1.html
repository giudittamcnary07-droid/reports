<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>甘志林 · 阶段1深扫报告</title>
<style>
:root{
  --paper:#f6f1e7; --paper2:#efe8d9; --card:#fbf8f1; --ink:#2b2620; --ink2:#5c5347;
  --line:#d9cfba; --red:#a8321f; --redbg:#f3e2dc; --amber:#b06d1a; --green:#4f6b3a;
  --shadow:0 1px 0 #fff inset, 0 2px 14px rgba(70,55,30,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:"Noto Sans SC","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif;font-weight:400;line-height:1.75;font-size:15px;padding:0 16px 80px;-webkit-font-smoothing:antialiased}
.wrap{max-width:760px;margin:0 auto}
header{padding:46px 0 26px;border-bottom:2px solid var(--ink)}
.kick{font-weight:500;letter-spacing:.32em;font-size:11px;color:var(--red);text-transform:uppercase}
h1{font-family:"Noto Serif SC","Noto Serif CJK SC","Songti SC",serif;font-weight:900;font-size:40px;line-height:1.1;margin:10px 0 6px;letter-spacing:.02em}
.sub{color:var(--ink2);font-size:13.5px}
.tagrow{margin-top:16px;display:flex;flex-wrap:wrap;gap:7px}
.tag{font-size:11.5px;padding:3px 11px;border:1px solid var(--line);border-radius:999px;background:var(--card);color:var(--ink2)}
.tag.red{border-color:var(--red);color:var(--red);background:var(--redbg);font-weight:700}
.selfcheck{margin:22px 0;padding:16px 18px;background:var(--paper2);border-left:4px solid var(--red);border-radius:0 8px 8px 0;font-size:13.5px;color:var(--ink2)}
.selfcheck b{color:var(--ink)}
section{padding:34px 0 6px;border-bottom:1px solid var(--line)}
.sechead{display:flex;align-items:baseline;gap:11px;margin-bottom:16px}
.senum{font-family:"Noto Serif SC","Noto Serif CJK SC","Songti SC",serif;font-weight:900;font-size:13px;color:var(--red);border:1.5px solid var(--red);border-radius:6px;padding:1px 8px;flex:none}
h2{font-family:"Noto Serif SC","Noto Serif CJK SC","Songti SC",serif;font-weight:700;font-size:22px;letter-spacing:.02em}
.aim{font-size:12.5px;color:var(--ink2);margin:-8px 0 16px 0;font-style:italic}
p{margin:9px 0}
table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;background:var(--card);box-shadow:var(--shadow);border-radius:8px;overflow:hidden}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
th{background:var(--paper2);font-weight:700;font-size:12px;color:var(--ink2);letter-spacing:.03em}
tr:last-child td{border-bottom:none}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.r3{color:var(--red);font-weight:700}
.r1{color:var(--red);font-weight:600}
.o{color:var(--amber);font-weight:600}
.dt{font-variant-numeric:tabular-nums;font-size:12px;color:var(--ink2)}
.mono{font-variant-numeric:tabular-nums;font-size:11.5px;letter-spacing:.02em}
.block{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:15px 17px;margin:14px 0;box-shadow:var(--shadow)}
.block.hot{border:1.5px solid var(--red)}
.block h3{font-family:"Noto Serif SC","Noto Serif CJK SC","Songti SC",serif;font-weight:700;font-size:15.5px;margin-bottom:6px}
h3{font-size:14px;font-weight:700;margin:16px 0 4px;color:#5a4d36}
.flag{display:inline-block;font-size:11px;font-weight:700;color:var(--red);background:var(--redbg);padding:1px 7px;border-radius:5px;margin-left:6px;vertical-align:middle}
.flowline{font-size:12.5px;color:var(--ink2);padding-left:14px;border-left:2px solid var(--line);margin:5px 0 5px 4px}
.flowline b{color:var(--red)}
.w
